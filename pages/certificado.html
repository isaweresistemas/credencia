<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Certificado — Isawere Credencia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#1e293b;line-height:1.55;}
    :root{
      --blue-50:#eff6ff;--blue-600:#2563eb;--blue-700:#1d4ed8;
      --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
      --gray-500:#64748b;--gray-700:#334155;--gray-900:#0f172a;
      --green-50:#f0fdf4;--green-500:#22c55e;
      --red-50:#fef2f2;--red-500:#ef4444;
      --amber-50:#fffbeb;--amber-500:#f59e0b;
      --radius:12px;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
    }
    .container{max-width:560px;margin:0 auto;padding:1.5rem 1rem 3rem;}
    .site-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;background:#fff;border-bottom:1px solid var(--gray-100);position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.08);}
    .logo{font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:800;color:var(--gray-900);text-decoration:none;display:flex;align-items:center;gap:.35rem;}
    .logo span{color:var(--blue-600);}
    .header-nav{display:flex;gap:.1rem;}
    .header-nav a{font-size:.82rem;font-weight:500;color:var(--gray-500);text-decoration:none;padding:.4rem .65rem;border-radius:6px;transition:background .15s,color .15s;}
    .header-nav a:hover,.header-nav a.active{background:var(--blue-50);color:var(--blue-600);}
    .page-hero{background:linear-gradient(135deg,var(--blue-600),var(--blue-700));color:#fff;padding:2rem 1.25rem 2.25rem;text-align:center;}
    .page-hero h1{font-family:'Sora',sans-serif;font-size:1.55rem;font-weight:800;margin-bottom:.4rem;}
    .page-hero p{font-size:.93rem;opacity:.88;}
    .card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem;margin-bottom:1rem;}
    .card-title{font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;color:var(--gray-900);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
    .form-group{margin-bottom:.9rem;}
    .form-group label{display:block;font-size:.83rem;font-weight:600;color:var(--gray-700);margin-bottom:.35rem;}
    input[type=text]{width:100%;padding:.6rem .75rem;font-size:.9rem;font-family:inherit;border:1.5px solid var(--gray-200);border-radius:8px;background:#fff;color:var(--gray-900);outline:none;transition:border-color .15s,box-shadow .15s;}
    input:focus{border-color:var(--blue-600);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.6rem 1.1rem;font-size:.88rem;font-weight:600;font-family:inherit;border-radius:8px;border:1.5px solid transparent;cursor:pointer;text-decoration:none;transition:all .15s;}
    .btn:disabled{opacity:.45;cursor:not-allowed;}
    .btn-primary{background:var(--blue-600);color:#fff;border-color:var(--blue-600);}
    .btn-primary:hover:not(:disabled){background:var(--blue-700);}
    .btn-success{background:#16a34a;color:#fff;border-color:#16a34a;}
    .btn-success:hover:not(:disabled){background:#15803d;}
    .btn-full{width:100%;}
    .alert{padding:.75rem 1rem;border-radius:8px;font-size:.88rem;margin-bottom:.75rem;border-left:4px solid;}
    .alert-error{background:var(--red-50);color:#b91c1c;border-color:var(--red-500);}
    .alert-warning{background:var(--amber-50);color:#92400e;border-color:var(--amber-500);}
    .info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;padding:.55rem 0;border-bottom:1px solid var(--gray-100);}
    .info-row:last-child{border-bottom:none;}
    .info-row .label{font-size:.8rem;color:var(--gray-500);font-weight:500;white-space:nowrap;min-width:90px;}
    .info-row .value{font-size:.88rem;color:var(--gray-900);text-align:right;}
    .divider{border:none;border-top:1px solid var(--gray-100);margin:1rem 0;}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    code{background:var(--gray-100);padding:.1rem .3rem;border-radius:4px;font-size:.85em;}

    /* Botão de download desabilitado com tooltip */
    .cert-btn-wrap { position: relative; }
    .cert-btn-wrap .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff;
      font-size: .75rem; font-weight: 500;
      padding: .35rem .65rem; border-radius: 6px;
      white-space: nowrap; pointer-events: none;
      z-index: 10;
    }
    .cert-btn-wrap:hover .tooltip { display: block; }
  </style>
</head>
<body>

<header class="site-header">
  <a class="logo" href="../index.html">🎓 <span>Isawere</span> Credencia</a>
  <nav class="header-nav">
    <a href="../index.html">Eventos</a>
    <a href="minha-inscricao.html">Minha Inscrição</a>
    <a href="certificado.html" class="active">Certificado</a>
  </nav>
</header>

<div class="page-hero">
  <h1>Certificado de Participação</h1>
  <p>Disponível para download após confirmação de presença no evento.</p>
</div>

<div class="container">

  <div id="alertBox"></div>

  <div class="card">
    <div class="card-title">🔍 Consultar certificado</div>

    <div class="form-group">
      <label>CPF ou código da inscrição</label>
      <input id="busca" type="text" placeholder="000.000.000-00 ou ISW-XXXXXX" />
    </div>

    <button class="btn btn-primary btn-full" id="btnBuscar">🔍 Buscar certificado</button>

    <p style="margin-top:.75rem;font-size:.82rem;color:var(--gray-500);text-align:center;">
      Demonstração: use CPF <code>123.456.789-09</code>
    </p>
  </div>

  <div id="resultadoParticipante" style="display:none;"></div>

</div>

<script>
// ===== CONFIG =====
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbySSIglvimz5jN4MbdY38Dwsn1Tg5AErRMEHw5c1u5cZy9mJryN-wq9two0S8OeBeRH/exec",

  // Caminho do PDF dentro da própria pasta do repositório.
  // O arquivo deve se chamar "certificado.pdf" e estar na mesma pasta que este HTML.
  CERT_PDF_PATH: "certificado.pdf",
};

// ===== UTILS =====
function formatCPF(v){v=v.replace(/\D/g,"");if(v.length>11)v=v.slice(0,11);return v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");}
function validCPF(c){c=c.replace(/\D/g,"");if(c.length!==11||/^(\d)\1+$/.test(c))return false;let s=0;for(let i=0;i<9;i++)s+=+c[i]*(10-i);let r=s%11<2?0:11-s%11;if(r!==+c[9])return false;s=0;for(let i=0;i<10;i++)s+=+c[i]*(11-i);r=s%11<2?0:11-s%11;return r===+c[10];}
async function appsScriptFetch(p){const u=CONFIG.APPS_SCRIPT_URL+"?"+new URLSearchParams(p);const r=await fetch(u,{redirect:"follow",mode:"cors"});return r.json();}
function showAlert(t,m){document.getElementById("alertBox").innerHTML=`<div class="alert alert-${t}">${m}</div>`;}
function clearAlert(){document.getElementById("alertBox").innerHTML="";}

// ===== DEMO =====
const DEMO_CERT = {
  "12345678909": {
    nome:"Maria Silva Santos", cpf:"123.456.789-09", codigo:"ISW-DEMO01",
    evento:"Curso de Audiometria Clínica", data:"15/08/2025",
    horario:"08:00 – 17:00", local:"Online (Zoom)", cargaHoraria:"8h",
    presenca:"Presente",   // troque para "Pendente" para ver o botão desabilitado
  }
};

// ===== MÁSCARA CPF =====
document.getElementById("busca").addEventListener("input", function(){
  if(!this.value.includes("@") && !this.value.toUpperCase().startsWith("ISW-") && !this.value.toUpperCase().startsWith("VIP-"))
    this.value = formatCPF(this.value);
});

// ===== AUTO-BUSCA POR URL =====
const paramsInit = new URLSearchParams(location.search);
if (paramsInit.get("codigo")) {
  document.getElementById("busca").value = paramsInit.get("codigo");
  setTimeout(() => document.getElementById("btnBuscar").click(), 400);
}

// ===== BUSCAR =====
document.getElementById("btnBuscar").addEventListener("click", async () => {
  const busca = document.getElementById("busca").value.trim();
  if (!busca) { showAlert("error", "Informe o CPF ou código."); return; }

  const btn = document.getElementById("btnBuscar");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Buscando…';
  clearAlert();

  try {
    let cert = null;
    const modoDemo = CONFIG.APPS_SCRIPT_URL.includes("SEU_ID_AQUI");

    if (!modoDemo) {
      const tipo = busca.includes("@") ? "email"
        : (busca.toUpperCase().startsWith("ISW-") || busca.toUpperCase().startsWith("VIP-")) ? "codigo"
        : "cpf";
      const d = await appsScriptFetch({ action: "getCertificado", busca, tipo });
      cert = d.certificado || null;
    } else {
      await new Promise(r => setTimeout(r, 500));
      const key = Object.keys(DEMO_CERT).find(k =>
        k === busca.replace(/\D/g,"") ||
        DEMO_CERT[k]?.codigo?.toUpperCase() === busca.toUpperCase()
      );
      cert = key ? DEMO_CERT[key] : null;
    }

    if (!cert) {
      showAlert("warning", "Certificado não encontrado. Verifique se sua presença foi confirmada no evento.");
      return;
    }

    renderResultado(cert);

  } catch (e) {
    showAlert("error", "Erro ao consultar: " + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = "🔍 Buscar certificado";
  }
});

// ===== RENDERIZAR RESULTADO =====
function renderResultado(cert) {
  const presente = cert.presenca === "Presente";

  // Badge de presença
  const presencaBadge = presente
    ? `<span style="background:var(--green-50);color:#15803d;padding:.2rem .6rem;border-radius:99px;font-size:.78rem;font-weight:600;">✅ Presença confirmada</span>`
    : `<span style="background:var(--amber-50);color:#92400e;padding:.2rem .6rem;border-radius:99px;font-size:.78rem;font-weight:600;">⏳ Presença pendente</span>`;

  // Botão de download: habilitado só se presente
  let downloadHtml = "";
  if (presente) {
    downloadHtml = `
      <button class="btn btn-success btn-full" id="btnDownloadCert">
        🎓 Baixar certificado em PDF
      </button>`;
  } else {
    downloadHtml = `
      <div class="cert-btn-wrap">
        <button class="btn btn-full" disabled
          style="background:var(--gray-100);color:var(--gray-500);border-color:var(--gray-200);cursor:not-allowed;">
          🎓 Certificado (aguardando presença)
        </button>
        <span class="tooltip">Disponível após confirmação de presença no evento</span>
      </div>`;
  }

  const res = document.getElementById("resultadoParticipante");
  res.innerHTML = `
    <div class="card">
      <div class="card-title">🎓 Resultado</div>

      <div style="background:${presente ? 'var(--green-50)' : 'var(--amber-50)'};border-radius:8px;padding:.75rem;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;">
        <span style="font-size:1.5rem;">${presente ? '✅' : '⏳'}</span>
        <div>
          <strong style="color:${presente ? '#065f46' : '#92400e'};">${cert.nome}</strong><br>
          <span style="font-size:.82rem;color:var(--gray-500);">${cert.evento}</span>
        </div>
      </div>

      <div class="info-row"><span class="label">CPF</span><span class="value">${cert.cpf}</span></div>
      <div class="info-row"><span class="label">Data</span><span class="value">${cert.data} · ${cert.horario}</span></div>
      <div class="info-row"><span class="label">Local</span><span class="value">${cert.local}</span></div>
      <div class="info-row"><span class="label">Carga horária</span><span class="value">${cert.cargaHoraria}</span></div>
      <div class="info-row"><span class="label">Presença</span><span class="value">${presencaBadge}</span></div>
      <div class="info-row"><span class="label">Código</span><span class="value" style="font-family:monospace;">${cert.codigo}</span></div>

      <hr class="divider" />

      ${downloadHtml}

      ${!presente ? `<p style="margin-top:.6rem;font-size:.8rem;color:var(--gray-500);text-align:center;">
        Sua presença será confirmada pelo organizador do evento. O botão será liberado automaticamente.
      </p>` : ''}
    </div>`;

  res.style.display = "block";
  res.scrollIntoView({ behavior: "smooth" });

  // Clique no botão de download — fetch+blob para funcionar no GitHub Pages
  if (presente) {
    document.getElementById("btnDownloadCert").addEventListener("click", async () => {
      const btn = document.getElementById("btnDownloadCert");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Preparando…';

      try {
        // Busca o PDF como blob (contorna restrição do GitHub Pages ao atributo download)
        const response = await fetch(CONFIG.CERT_PDF_PATH);
        if (!response.ok) throw new Error("PDF não encontrado na pasta.");
        const blob = await response.blob();

        // Nome do arquivo com nome do participante (sem acentos, espaços viram _)
        const nomeArquivo = cert.nome
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, "_")
          .toLowerCase();

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `certificado_${nomeArquivo}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);

      } catch (e) {
        alert("Erro ao baixar o certificado: " + e.message + "\n\nVerifique se o arquivo 'certificado.pdf' está na mesma pasta.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = "🎓 Baixar certificado em PDF";
      }
    });
  }
}
</script>
</body>
</html>
